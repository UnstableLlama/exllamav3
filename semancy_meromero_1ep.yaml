# EXL3 QLoRA — Gemma4-MoE (MeroMero-26B-A4B) on semancy, 1-epoch run with
# rsLoRA + PiSSA (2026-07-11). Successor to semancy_gemma_moe.yaml with the
# recipe lessons applied: 1 epoch (the sweet spot), eval_every so save_best
# fires, checkpoint_every instead of save_every (which clobbers save_best).
# Also produces the fresh routed-expert adapter for the expert-inference demo.
# Launch: PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True \
#           python training/qlora_train.py --config semancy_meromero_1ep.yaml

# Required
model: /mnt/two/weights/dr-house_mdzerofata-gemma4-G4-MeroMero-26B-A4B-4.45bpw-exl3
out: out/meromero_semancy_1ep

# Execution mode
parallel: split
split_even: true            # balanced split; was use_per_device: [8, 23] (starve-split from the S26 smoke; head on cuda:1)

# LoRA / optimization
r: 32
alpha: 32                   # alpha = r; with rsLoRA eff scale = 32/sqrt(32) ~= 5.7
use_rslora: true
init_lora: pissa
expert_r: 2                 # routed-expert adapter rank
lr: 0.00005                 # 5e-5 (validated semancy recipe)
weight_decay: 0.01
scheduler: cosine
warmup_ratio: 0.03
epochs: 1                   # held-out curve showed the 1-epoch sweet spot
batch: 2
grad_accum: 1
max_grad_norm: 1.0
compute_dtype: bfloat16

# Data
dataset: UnstableLlama/semancy
messages_key: messages      # semancy is an OpenAI-style chat dataset
prompt_format: gemma4-nothink
seq_len: 1024               # semancy prompts ~26 tok, responses ~370
pack: false
shuffle: true

# Trainable modules — 7 default projections + the three routed-expert projs
targets:
  - down_proj
  - gate_proj
  - up_proj
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - expert_gate_proj
  - expert_up_proj
  - expert_down_proj
offload_activations: true
attn_impl: auto
sample_every: 0             # no live 26B decode samples; judge by eval curve

# Checkpoints (checkpoint_every, NOT save_every — save_every clobbers save_best)
checkpoint_every: 40
keep_checkpoints: 12

# Evaluation / run log
eval_split: test            # 116-row held-out split
eval_every: 20              # save_best is gated on eval_every > 0
save_best: true
profile_dequant: 0          # dequant already characterized (7.6s/step, S26)
run_log: qlora_runs.csv
