# Llama-3.2-1B-Instruct (4bpw) on semancy -- EBFT arm of the SFT-vs-EBFT A/B.
# Pairs with semancer_llama1b_sft.yaml: identical data / LoRA / optimizer; only
# the objective differs (energy-based feature matching vs next-token CE).
# Watch for the paper's signature in the overlaid report: eval/held_out (CE) AND
# eval/cfm both falling -- EBFT-only charts (reward/align/div/cfm) appear too.
#
# Launch:
#   CUDA_VISIBLE_DEVICES=0 PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True \
#     python training/qlora_train.py --config semancer_llama1b_ebft.yaml
#
# NOTE: EBFT is ~32 s/step on a 1B (the on-policy sampler re-forwards G times),
# vs seconds/step for the SFT arm. ~436 examples / batch 4 = ~109 steps/epoch.

method: ebft
model: /mnt/two/weights/meta-llama-Llama-3.2-1B-Instruct/4
out: out/ab_ebft
run_name: llama1b-semancy-ebft

parallel: single

# LoRA / optimization  (matched to the SFT arm)
r: 16
alpha: 16
use_rslora: true
init_lora: default     # keeps phi == step-0 policy (the paper's setup); NOT qerr
lr: 0.00001            # << DECIDE (LR): EBFT 1e-5 (its smoke value), or match SFT exactly
weight_decay: 0.01
scheduler: cosine
warmup_ratio: 0.03
epochs: 1              # << DECIDE (scale): keep equal to the SFT arm
batch: 4               # rollout rows/microbatch = batch * anchors * n_samples = 4*4*4 = 64
grad_accum: 1
max_grad_norm: 1.0
compute_dtype: bfloat16

# EBFT objective (reference-code defaults)
mode: qa
gen_len: 8
n_samples: 4
anchors: 4
temperature: 0.6
div_coef: 0.5
ce_coef: 0.03

# Data
dataset: UnstableLlama/semancy
messages_key: messages
prompt_format: auto
seq_len: 1024
shuffle: true

# Trainable modules
targets:
  - down_proj
  - gate_proj
  - up_proj
  - q_proj
  - k_proj
  - v_proj
  - o_proj
offload_activations: true
attn_impl: auto

# Evaluation (eval also runs rollouts for held-out CFM -- the paper's headline
# metric -- so each eval costs more than the SFT arm's; raise eval_every if slow)
eval_split: test
eval_every: 10
save_best: true
run_log: qlora_runs.csv

# Logging: local HTML run report on by default (run_name above titles it).
