# EXL3 QLoRA — Gemma4-MoE (MeroMero-26B-A4B) on semancy, eval-split SFT.
# Launch: PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True \
#           python training/qlora_train.py --config semancy_gemma_moe.yaml
# (add --dry-run to print the backend command without training)

# Required
model: /mnt/two/weights/dr-house_mdzerofata-gemma4-G4-MeroMero-26B-A4B-4.45bpw-exl3
out: out/gemma4moe_semancy

# Execution mode
parallel: split
use_per_device: [8, 23]     # starve-split from the S26 smoke; head on cuda:1

# LoRA / optimization
r: 32
alpha: 64
expert_r: 2                 # routed-expert adapter rank
lr: 0.00005                 # 5e-5, 10x the underwhelming 5e-6 malazan runs
weight_decay: 0.01
scheduler: cosine
warmup_ratio: 0.03
epochs: 2
batch: 2
grad_accum: 1
max_grad_norm: 1.0
compute_dtype: bfloat16

# Data
dataset: UnstableLlama/semancy
messages_key: messages      # semancy is an OpenAI-style chat dataset (no instruction/output cols)
prompt_format: gemma4-nothink
seq_len: 1024
pack: false
shuffle: true
max_samples: 4000

# Trainable modules — 7 default projections + the three routed-expert projs
targets:
  - down_proj
  - gate_proj
  - up_proj
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - expert_gate_proj
  - expert_up_proj
  - expert_down_proj
offload_activations: true
attn_impl: auto

# Checkpoints
save_every: 40
checkpoint_every: 40
keep_checkpoints: 10

# Evaluation / run log
eval_split: test           # 116-row held-out split
save_best: true            # keep the lowest held-out-loss checkpoint
profile_dequant: 3         # first-run dequant profile; set 0 for reruns
run_log: qlora_runs.csv
