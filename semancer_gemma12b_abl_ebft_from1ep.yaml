# EBFT continuation of the gemma-4-12B abliterated SFT run, resuming from the
# 1-EPOCH SFT checkpoint (step 54). Paper-faithful LR: 1e-6 CONSTANT (scheduler
# none) -- our earlier EBFT A/B ran 10-20x too hot. Standard rollout params
# (EBFT defaults: mode qa, gen_len 8, n_samples 4, anchors 4, temp 0.6,
# align 1.0, div 0.5, rl 1.0, ce 0.03). EBFT is single|split only (no DDP).
# Launch: PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True \
#           python training/qlora_train.py --config semancer_gemma12b_abl_ebft_from1ep.yaml

method: ebft
model: /home/unstable/weights/gemma-4-12B-it-abliterated-uncensored-exl3-4bpw
out: out/semancer_gemma12b_abl_ebft_from1ep
run_name: gemma12b-abl-ebft-from1ep

# EBFT can't DDP; split the 12B across both 3090s
parallel: split
split_even: true

# LoRA -- MUST match the SFT checkpoint (r/alpha/rslora/init/targets) so the
# adapter + pissa sidecar load cleanly on resume
r: 32
alpha: 32
use_rslora: true
init_lora: pissa

# Resume the SFT-trained adapter at 1 epoch; reset the optimizer (new objective +
# LR, and it zeroes the step counter -> clean join for the resume-overlay chart)
resume: out/semancer_gemma12b_abliterated/checkpoint-00000054
reset_optimizer: true

# Optimization -- 1e-6 constant
lr: 0.000001
scheduler: none
warmup_ratio: 0.0
weight_decay: 0.01
epochs: 1
batch: 1
grad_accum: 1
max_grad_norm: 1.0
compute_dtype: bfloat16

# Rollouts -- all at EBFT defaults (standard). native = KV-cached sampler (dense
# model); falls back to exact if it errors on this model.
rollout_sampler: native
offload_activations: false      # EBFT + offload = host-RAM OOM; keep OFF

# Data -- local semancy v4 (hub parquet still stale)
dataset: mala-data/semancy_v4_train.jsonl
eval_dataset: mala-data/semancy_test.jsonl
eval_split: train               # json builder names a local single-file split 'train'
messages_key: messages
prompt_format: gemma4-nothink
seq_len: 2048
shuffle: true
targets:
  - down_proj
  - gate_proj
  - up_proj
  - q_proj
  - k_proj
  - v_proj
  - o_proj
attn_impl: auto

# Eval / checkpoints
sample_every: 0
eval_every: 25
eval_cfm_samples: 32            # CFM eval on a fixed 32-row subset; CE eval full
checkpoint_every: 200           # crash safety on a long run (~648 steps/epoch)
keep_checkpoints: 0
save_best: true
run_log: qlora_runs.csv
