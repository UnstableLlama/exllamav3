# Qwen3.5-4B (4bpw) on semancy -- EBFT at DOUBLE the A/B LR (2e-5).
# Identical to semancer_qwen35_4b_ebft.yaml except lr (1e-5 -> 2e-5), out, run_name.
# Tests whether EBFT has more LR headroom than SFT: EBFT@1e-5 finished UNCONVERGED
# (held-out CE still descending), and SFT gained only ~0.033 CE from 1e-5->2e-5.
# The question is whether EBFT@2e-5 gains substantially more than that.
# Overlay the EBFT LR pair, and the full 4-way, with:
#   python training/run_report.py out/ab_qwen35_4b_ebft out/ab_qwen35_4b_ebft_lr2x \
#       --labels EBFT-1e5,EBFT-2e5 -o out/qwen35_4b_ebft_lr.html
#   python training/run_report.py out/ab_qwen35_4b_sft out/ab_qwen35_4b_sft_lr2x \
#       out/ab_qwen35_4b_ebft out/ab_qwen35_4b_ebft_lr2x \
#       --labels SFT-1e5,SFT-2e5,EBFT-1e5,EBFT-2e5 -o out/qwen35_4b_full_sweep.html
#
# Launch:
#   CUDA_VISIBLE_DEVICES=1 PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True \
#     python training/qlora_train.py --config semancer_qwen35_4b_ebft_lr2x.yaml

method: ebft
model: /mnt/two/weights/Qwen_Qwen3.5-4B/4
out: out/ab_qwen35_4b_ebft_lr2x
run_name: qwen35-4b-semancy-ebft-lr2x

parallel: single

# LoRA / optimization  (matched to the 1e-5 EBFT arm EXCEPT lr, doubled)
r: 16
alpha: 16
use_rslora: true
init_lora: default
lr: 0.00002            # 2e-5 -- DOUBLE the A/B's 1e-5; the only intended change
weight_decay: 0.01
scheduler: cosine
warmup_ratio: 0.03
epochs: 1
batch: 4               # rollout rows/microbatch = batch * anchors * n_samples = 4*4*4 = 64
grad_accum: 1
max_grad_norm: 1.0
compute_dtype: bfloat16

# EBFT objective (reference-code defaults; identical to the 1e-5 EBFT arm)
mode: qa
gen_len: 8
n_samples: 4
anchors: 4
temperature: 0.6
div_coef: 0.5
ce_coef: 0.03
rollout_sampler: native

# Data
dataset: UnstableLlama/semancy
messages_key: messages
prompt_format: qwen3.5-nothink   # this model's validated chat format (not `auto`)
seq_len: 1024
shuffle: true

# Trainable modules (7 default projections; Qwen3.5-4B text tower is dense)
targets:
  - down_proj
  - gate_proj
  - up_proj
  - q_proj
  - k_proj
  - v_proj
  - o_proj
offload_activations: false

attn_impl: auto

# Live sample generations -- matched to the 1e-5 EBFT arm.
sample_every: 11
sample_prompt: "What is truth?"

# Evaluation (eval also runs rollouts for held-out CFM)
eval_split: test
eval_every: 10
eval_cfm_samples: 32
save_best: true
run_log: qlora_runs.csv

# Logging: local HTML run report on by default (run_name above titles it).
