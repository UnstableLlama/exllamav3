# EXL3 QLoRA -- Gemma-4-12B-it ABLITERATED (sjoe1244 4bpw quant) on semancy v4.
# First production DDP run (Session 44: rslora/pissa ported to the DDP backend).
# Recipe from the Session-28-validated semancer_gemma12b.yaml: rsLoRA + PiSSA,
# alpha = r, lr 1e-5 (5e-5 diverged on gemma+PiSSA), but per-GPU batch 1 x 2
# ranks (eff 2) and 2 epochs per the 2026-07-18 session plan.
# NB: dataset is the LOCAL v4 jsonl (648 rows) -- the hub parquet still serves
# the stale 436-row v2 (README config points at data/train.parquet).
# Launch: PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True \
#           python training/qlora_train.py --config semancer_gemma12b_abliterated.yaml

# Required
model: /home/unstable/weights/gemma-4-12B-it-abliterated-uncensored-exl3-4bpw
out: out/semancer_gemma12b_abliterated

# Execution mode -- DDP, one full 4bpw replica per 3090 (7.8 GB weights + bf16
# 262k-vocab head per rank; if a rank OOMs, add head_vocab_chunk: 32768)
parallel: ddp
ddp:
  nproc_per_node: 2
  standalone: true

# LoRA / optimization
r: 32
alpha: 32                   # alpha = r; with rsLoRA eff scale = 32/sqrt(32) ~= 5.7
use_rslora: true
init_lora: pissa            # rank-0 SVD, broadcast to all ranks (incl. A0/B0 offsets)
lr: 0.00001                 # 1e-5 -- 5e-5 diverged on gemma+PiSSA (12B run, 2026-07-12)
weight_decay: 0.01
scheduler: cosine
warmup_ratio: 0.1           # ~11 warmup steps at ~109 packed steps; 1-step warmup fed the old divergence
epochs: 2
batch: 1                    # PER-GPU micro-batch; eff_batch = 1 x 2 ranks x 1 accum = 2
grad_accum: 1
max_grad_norm: 1.0
compute_dtype: bfloat16

# Data -- LOCAL semancy v4 (see NB above; staged from the 2026-07-18 hub jsonl)
dataset: mala-data/semancy_v4_train.jsonl
eval_dataset: mala-data/semancy_test.jsonl
eval_split: train           # the json builder names a local single-file split 'train'
messages_key: messages
prompt_format: gemma4-nothink
seq_len: 2048               # packed blocks of 2048
pack: true
pack_algo: bfd
shuffle: true

# Trainable modules -- 7 default projections (dense model)
targets:
  - down_proj
  - gate_proj
  - up_proj
  - q_proj
  - k_proj
  - v_proj
  - o_proj
attn_impl: auto
sample_every: 0             # judge by eval curve; before/after decode runs post-hoc

# Checkpoints -- every HALF EPOCH (~27 steps at ~109 total; verify against the
# "packed N docs -> M blocks" line at launch and relaunch if off by >20%)
checkpoint_every: 27
keep_checkpoints: 0         # keep all

# Evaluation / run log -- eval_every divides checkpoint_every so every
# checkpoint lands on an eval step
eval_every: 9
save_best: true
profile_dequant: 3
run_log: qlora_runs.csv
run_name: semancer_gemma12b_abliterated
