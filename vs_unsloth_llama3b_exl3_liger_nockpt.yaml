# EXL3-vs-unsloth Tier-1 A/B, arm 2 (+liger +no-grad-ckpt) — Session 35,
# S32 plan step 2. Identical to vs_unsloth_llama3b_exl3_liger.yaml plus
# no_grad_ckpt: true (audit A2: deletes the checkpoint-recompute forward,
# ceiling ~1.45x step speedup, dequants 3->2/step; spends VRAM for speed —
# NOTE this arm is deliberately UNmatched vs the unsloth run, which
# checkpoints; it measures our speed ceiling on this run class).
# offload_activations stays set but is a no-op without checkpointing.
# Launch: CUDA_VISIBLE_DEVICES=1 PYTHONUNBUFFERED=1 \
#           PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True \
#           python training/qlora_train.py --config vs_unsloth_llama3b_exl3_liger_nockpt.yaml

model: /mnt/two/weights/meta-llama-Llama-3.2-3B-Instruct/4
out: out/vs_unsloth_llama3b_exl3_liger_nockpt

parallel: single

r: 32
alpha: 32
use_rslora: true
init_lora: default
lr: 0.00005
weight_decay: 0.01
scheduler: cosine
warmup_ratio: 0.03
epochs: 1
batch: 4
grad_accum: 1
max_grad_norm: 1.0
compute_dtype: bfloat16
use_liger: true
no_grad_ckpt: true          # <-- change vs the liger arm

dataset: UnstableLlama/semancy
messages_key: messages
prompt_format: auto
seq_len: 1024
pack: false
shuffle: true

targets:
  - down_proj
  - gate_proj
  - up_proj
  - q_proj
  - k_proj
  - v_proj
  - o_proj
offload_activations: true
attn_impl: auto
sample_every: 0

eval_split: test
eval_every: 10
save_best: true
run_log: qlora_runs.csv
