# EXL3 QLoRA — Qwen3.5-4B (8bpw) on semancy. Session-28 validated recipe:
# rsLoRA + PiSSA, alpha = r, lr 5e-5, 2 epochs, save_best picks the sweet spot.
# Launch: PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True \
#           python training/qlora_train.py --config semancer_qwen35_4b.yaml

# Required
model: /mnt/two/weights/Qwen_Qwen3.5-4B/8
out: out/semancer_qwen35_4b

# Execution mode — 4B fits a single 3090 easily
parallel: single

# LoRA / optimization
r: 32
alpha: 32                   # alpha = r; with rsLoRA eff scale = 32/sqrt(32) ~= 5.7
use_rslora: true
init_lora: pissa
lr: 0.00005                 # 5e-5 (the Gemma4-MoE semancy sweet-spot recipe)
weight_decay: 0.01
scheduler: cosine
warmup_ratio: 0.03
epochs: 2                   # past the 1-epoch sweet spot so save_best can pick it
batch: 4
grad_accum: 1
max_grad_norm: 1.0
compute_dtype: bfloat16

# Data
dataset: UnstableLlama/semancy
messages_key: messages      # semancy is an OpenAI-style chat dataset
prompt_format: qwen3.5-nothink
seq_len: 1024               # semancy prompts ~26 tok, responses ~370
pack: false
shuffle: true

# Trainable modules — 7 default projections (dense model)
targets:
  - down_proj
  - gate_proj
  - up_proj
  - q_proj
  - k_proj
  - v_proj
  - o_proj
offload_activations: true
attn_impl: auto
sample_every: 0             # judge by eval curve; before/after decode runs post-hoc

# Checkpoints (checkpoint_every, NOT save_every — save_every clobbers save_best)
checkpoint_every: 27        # matched to eval_every so every checkpoint has an eval
keep_checkpoints: 0         # keep all; suite prunes to top-4 held-out + final post-run

# Evaluation / run log
eval_split: test            # 116-row held-out split
eval_every: 27            # quarter-epoch cadence (109 steps/epoch at batch 4)
save_best: true
profile_dequant: 3
run_log: qlora_runs.csv
