# EXL3-vs-unsloth comparison, EXL3 arm — Llama-3.2-3B-Instruct (4bpw) on semancy.
# Standing recipe (Session 28): rsLoRA + PiSSA, alpha = r, lr 5e-5, 1 epoch.
# Matched to training/qlora_train_unsloth.py (unsloth arm) on everything but the
# frozen-weight format / framework. Track: held-out loss, peak VRAM, wall clock.
# Launch: CUDA_VISIBLE_DEVICES=1 PYTHONUNBUFFERED=1 \
#           PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True \
#           python training/qlora_train.py --config vs_unsloth_llama3b_exl3.yaml

# Required
model: /mnt/two/weights/meta-llama-Llama-3.2-3B-Instruct/4
out: out/vs_unsloth_llama3b_exl3_pissa

# Execution mode — 3B fits a single 3090 easily
parallel: single

# LoRA / optimization
r: 32
alpha: 32                   # alpha = r; with rsLoRA eff scale = 32/sqrt(32) ~= 5.7
use_rslora: true
init_lora: pissa            # standing-recipe arm (NOT matched to unsloth)
lr: 0.00005                 # 5e-5 (validated on Llama 3B semancy, Session 25/28)
weight_decay: 0.01
scheduler: cosine
warmup_ratio: 0.03
epochs: 1                   # 109 steps at batch 4; save_best guards the tail
batch: 4
grad_accum: 1
max_grad_norm: 1.0
compute_dtype: bfloat16

# Data
dataset: UnstableLlama/semancy
messages_key: messages      # semancy is an OpenAI-style chat dataset
prompt_format: auto         # Llama-3 native template
seq_len: 1024               # semancy prompts ~26 tok, responses ~370
pack: false
shuffle: true

# Trainable modules — 7 default projections (dense model)
targets:
  - down_proj
  - gate_proj
  - up_proj
  - q_proj
  - k_proj
  - v_proj
  - o_proj
offload_activations: true
attn_impl: auto
sample_every: 0

# Evaluation / run log
eval_split: test            # 116-row held-out split
eval_every: 10
save_best: true
run_log: qlora_runs.csv
