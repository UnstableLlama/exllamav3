# EXL3 QLoRA training config. Launch with:
#   python training/qlora_train.py --config training/qlora_train_config.yaml
#
# One file selects the execution mode:
#   parallel: single  # one process, one GPU
#   parallel: split   # one process, native layer-autosplit across visible GPUs
#   parallel: ddp     # launcher execs torchrun + training/qlora_train_native_ddp.py
#
# Keys mirror the CLI flags in training/qlora_train_native.py. Use snake_case here;
# the launcher converts to --kebab-case. DDP-only launch settings live under ddp:.

# Required
model: /path/to/exl3_model
out: out/exl3_qlora_adapter

# Execution mode
parallel: single
device: cuda:0
reserve_per_device: null   # split only, e.g. [1, 8] or [-1, 20]
use_per_device: null       # split only, e.g. [1, 8] to force a boundary

# DDP torchrun launch settings (used only when parallel: ddp)
ddp:
  nproc_per_node: 2
  standalone: true
  nnodes: null
  node_rank: null
  master_addr: null
  master_port: null
  rdzv_backend: null
  rdzv_endpoint: null
  rdzv_id: null

# LoRA / optimization
r: 32
alpha: 64.0
lr: 0.0002
weight_decay: 0.01
optim: adamw              # single/split only: adamw, adamw8bit, paged_adamw8bit
scheduler: none           # none, linear, cosine
warmup_ratio: 0.0
warmup_steps: 0
epochs: 0.0
steps: 1000
batch: 4                  # per-GPU micro-batch under ddp
grad_accum: 1
max_grad_norm: 1.0

# Data
dataset: superdrew100/UwU_Alpaca_data
dataset_split: train
instruction_key: instruction
context_key: input
response_key: output
messages_key: null
prompt_format: auto       # auto, mistral, metharme, gemma4-nothink, llama3, qwen3.5, qwen3.5-nothink
clean_text: false
no_clean_text: false      # deprecated compatibility knob
min_response_words: 3
uppercase_response: false
max_samples: 4000
shuffle: false
shuffle_seed: 0
seq_len: 512
pack: false
pack_algo: bfd            # bfd (best-fit decreasing, ~97%+ fill) | nextfit (old)
ga_loss: token            # token (weight micro-batches by supervised tokens) | mean (old)
profile_dequant: 0        # time trellis reconstruction for the first N steps
inspect: 0                # single/split only

# Trainable modules / memory levers
targets: null             # null = default projections; [] = no per-linear LoRA (embed/head only).
                          # MoE models (Qwen3-MoE / Qwen3.5-MoE): plain gate/up/down_proj adapt the
                          # dense/shared-expert paths only; add expert_gate_proj expert_up_proj
                          # expert_down_proj to also adapt the routed experts (router always frozen).
expert_r: null            # LoRA rank for routed-expert adapters (null = same as r). On a
                          # many-expert model use a small value (PEFT's recipe: ~r/num_experts, min 1).
train_embeddings: false
train_head: false
lora_embed: false         # single/split only
lora_head: false          # single/split only
offload_embed_head_optim: false  # single/split only, requires torchao + train_embeddings/train_head
offload_activations: false       # single/split only
use_liger: false                 # single/split only
use_rslora: false                # single/split only; scale = alpha/sqrt(r) (rank-sweep stable)
init_lora: default               # single/split only; default | pissa | qerr | eva (SVD adapter inits;
                                 #   gate first: qlora_validate_native.py --init-lora <mode>)
init_svd_niter: 16               # randomized-SVD iterations for init_lora (0 = exact, slow)
init_ref_model: null             # ORIGINAL unquantized HF model dir (required by init_lora: qerr)
init_eva_tokens: 65536           # token budget for the eva activation pre-pass (init_lora: eva)
quant_aware: none                # single/split only; none | noise | ste. Quantization-aware LoRA so
                                 #   the trained delta survives merge-and-requantize: noise = fresh
                                 #   per-step pseudo-quant noise on the adapted frozen weights; ste =
                                 #   the adapter delta snapped to the quant floor (straight-through).
quant_aware_scale: 1.0           # multiplier on the per-layer quant-error scale
quant_aware_ref_model: null      # ORIGINAL unquantized HF dir to MEASURE the error scale (exact);
                                 #   falls back to init_ref_model, else the trellis-bitrate estimate
compute_dtype: bfloat16
no_grad_ckpt: false
attn_impl: auto           # auto, eager, flash
ce_chunk: 1024
head_vocab_chunk: 0

# Sampling / checkpoints / resume
sample_every: 25          # single/split only
sample_prompt: Tell me about your day.
save_every: 0
checkpoint_every: 0
keep_checkpoints: 0
resume: null
reset_optimizer: false

# Evaluation / run log
#
# PRIMARY eval (what --save-best and the printed "val" loss track). The usual
# setup for a dataset with its own held-out split is just:
#   eval_split: test
#   eval_every: 50
# eval2_* is an optional SECOND monitor with the same options (e.g. wikitext
# LM loss watched alongside your task eval); it never drives save_best.
eval_split: null          # split of eval_dataset (or dataset) used as held-out eval
eval_dataset: null        # defaults to `dataset`
eval_config: null         # HF dataset config for the primary eval set
eval_text_key: null       # set (e.g. text) for a plain-text LM eval instead of SFT
eval_max_samples: 0       # cap source rows (0 = all)
eval_max_blocks: 0        # cap packed LM blocks when eval_text_key is set (0 = all)
eval2_dataset: null       # enable the second monitor by naming a dataset here
eval2_split: test
eval2_config: null        # e.g. wikitext-2-raw-v1 for the wikitext dataset
eval2_text_key: null      # e.g. text -> LM loss over packed seq_len blocks
eval2_max_samples: 0
eval2_max_blocks: 0       # size eval2 to roughly match the primary eval set
val_frac: 0.0             # no eval_split? carve this fraction off train instead
eval_every: 0             # report held-out loss every N steps (0 = only at the end)
save_best: false          # save only when the PRIMARY held-out loss improves
run_log: qlora_runs.csv
