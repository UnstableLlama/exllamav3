# Session 35 — profiler pass for the S32 unsloth forward-gap split.
# Exact clone of vs_unsloth_llama3b_exl3.yaml except: 20 steps instead of 1
# epoch, torch.profiler window armed (3 skip + 2 warmup + 10 active), eval /
# sampling / run-log off (profiled throughput is not representative — keep it
# out of qlora_runs.csv).
# Launch: CUDA_VISIBLE_DEVICES=1 PYTHONUNBUFFERED=1 \
#           PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True \
#           python training/qlora_train.py --config training/experiments/profile_fwdgap_llama3b.yaml
# Artifacts: out/profile_fwdgap_llama3b/torch_profile/{trace.json.gz,
#            key_averages_{cuda,cpu}.txt, key_averages_stacks.txt}

model: /mnt/two/weights/meta-llama-Llama-3.2-3B-Instruct/4
out: out/profile_fwdgap_llama3b

parallel: single

r: 32
alpha: 32
use_rslora: true
init_lora: default
lr: 0.00005
weight_decay: 0.01
scheduler: cosine
warmup_ratio: 0.03
epochs: 0                   # steps drives the length here
steps: 20                   # 3 skip + 2 warmup + 10 profiled + tail
torch_profile: 10
batch: 4
grad_accum: 1
max_grad_norm: 1.0
compute_dtype: bfloat16

dataset: UnstableLlama/semancy
messages_key: messages
prompt_format: auto
seq_len: 1024
pack: false
shuffle: true

targets:
  - down_proj
  - gate_proj
  - up_proj
  - q_proj
  - k_proj
  - v_proj
  - o_proj
offload_activations: true
attn_impl: auto
sample_every: 0

eval_every: 0
run_log: ""                 # profiled tok/s is garbage; keep the CSV clean
