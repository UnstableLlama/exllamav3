# EXL3-vs-unsloth Tier-1 A/B, arm 1 (+liger) — Session 35, S32 plan step 2.
# Identical to vs_unsloth_llama3b_exl3.yaml except use_liger: true (fused
# RMSNorm/RoPE/SwiGLU + chunked CE — parity with unsloth's fused kernel set,
# which was ON in the S32 comparison while ours was OFF).
# Launch: CUDA_VISIBLE_DEVICES=1 PYTHONUNBUFFERED=1 \
#           PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True \
#           python training/qlora_train.py --config vs_unsloth_llama3b_exl3_liger.yaml

model: /mnt/two/weights/meta-llama-Llama-3.2-3B-Instruct/4
out: out/vs_unsloth_llama3b_exl3_liger

parallel: single

r: 32
alpha: 32
use_rslora: true
init_lora: default
lr: 0.00005
weight_decay: 0.01
scheduler: cosine
warmup_ratio: 0.03
epochs: 1
batch: 4
grad_accum: 1
max_grad_norm: 1.0
compute_dtype: bfloat16
use_liger: true             # <-- the ONLY change vs the S32 EXL3 arm

dataset: UnstableLlama/semancy
messages_key: messages
prompt_format: auto
seq_len: 1024
pack: false
shuffle: true

targets:
  - down_proj
  - gate_proj
  - up_proj
  - q_proj
  - k_proj
  - v_proj
  - o_proj
offload_activations: true
attn_impl: auto
sample_every: 0

eval_split: test
eval_every: 10
save_best: true
run_log: qlora_runs.csv
