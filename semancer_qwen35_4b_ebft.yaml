# Qwen3.5-4B (4bpw) on semancy -- EBFT arm of the SFT-vs-EBFT A/B.
# Pairs with semancer_qwen35_4b_sft.yaml: identical data / LoRA / optimizer; only
# the objective differs (energy-based feature matching vs next-token CE).
# Hyperparameters MATCH the Llama-1B A/B (r16/a16, lr 1e-5, 1 epoch, G8/n4/
# anchors4) so the two model scales are comparable. Watch for the paper's
# signature in the overlaid report: eval/held_out (CE) AND eval/cfm both falling.
#
# Launch:
#   CUDA_VISIBLE_DEVICES=1 PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True \
#     python training/qlora_train.py --config semancer_qwen35_4b_ebft.yaml
#
# NOTE (throughput): with rollout_sampler: native this is the fast path. On a 4B
# expect meaningfully slower steps than the 1B (~7 s/step there); eval also runs
# rollouts (eval_cfm_samples caps it). ~436 examples / batch 4 = ~109 steps/epoch.
#
# VRAM WATCH: 4B (32 layers, hidden 2560) with batch 4 -> 64 rollout rows may
# approach 24 GB on a 3090. Watch peak VRAM on the first ~5 steps. If it OOMs,
# drop `batch` to 2 (rollout rows -> 32), do NOT enable offload_activations
# (EBFT's per-step shape variance OOMs the host -- see doc/ebft.md).

method: ebft
model: /mnt/two/weights/Qwen_Qwen3.5-4B/4
out: out/ab_qwen35_4b_ebft
run_name: qwen35-4b-semancy-ebft

parallel: single

# LoRA / optimization  (matched to the SFT arm AND to the Llama-1B A/B)
r: 16
alpha: 16
use_rslora: true
init_lora: default     # keeps phi == step-0 policy (the paper's setup); NOT qerr
lr: 0.00001            # 1e-5, matched to the SFT arm (EBFT's smoke value too)
weight_decay: 0.01
scheduler: cosine
warmup_ratio: 0.03
epochs: 1
batch: 4               # rollout rows/microbatch = batch * anchors * n_samples = 4*4*4 = 64
grad_accum: 1
max_grad_norm: 1.0
compute_dtype: bfloat16

# EBFT objective (reference-code defaults; identical to the Llama-1B A/B)
mode: qa
gen_len: 8
n_samples: 4
anchors: 4
temperature: 0.6
div_coef: 0.5
ce_coef: 0.03
rollout_sampler: native  # KV-cached sampling via the runtime-LoRA slots (dense
                         # model, so no MoE caveat). Set `exact` for a strictly
                         # zero-mismatch run.

# Data
dataset: UnstableLlama/semancy
messages_key: messages
prompt_format: qwen3.5-nothink   # this model's validated chat format (not `auto`)
seq_len: 1024
shuffle: true

# Trainable modules (7 default projections; Qwen3.5-4B text tower is dense)
targets:
  - down_proj
  - gate_proj
  - up_proj
  - q_proj
  - k_proj
  - v_proj
  - o_proj
offload_activations: false   # OFF: EBFT's per-step shape variance grows the
                             # pinned pool unbounded and OOM'd the host. See the
                             # VRAM WATCH note above for the batch-2 fallback.
attn_impl: auto

# Live sample generations -- matched to the SFT arm (~a tenth of an epoch).
sample_every: 11
sample_prompt: "What is truth?"

# Evaluation (eval also runs rollouts for held-out CFM -- the paper's headline
# metric -- so each eval costs more than the SFT arm's)
eval_split: test
eval_every: 10
eval_cfm_samples: 32   # CFM eval on a fixed-seed 32/116 subset; CE eval full
save_best: true
run_log: qlora_runs.csv

# Logging: local HTML run report on by default (run_name above titles it).
