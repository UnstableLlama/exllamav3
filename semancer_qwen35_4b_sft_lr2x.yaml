# Qwen3.5-4B (4bpw) on semancy -- SFT at DOUBLE the A/B LR (2e-5).
# Identical to semancer_qwen35_4b_sft.yaml except lr (1e-5 -> 2e-5), out, run_name.
# LR-sensitivity probe for the Qwen SFT arm. Overlay against the 1e-5 SFT and the
# EBFT arm:
#   python training/run_report.py out/ab_qwen35_4b_sft out/ab_qwen35_4b_sft_lr2x \
#       out/ab_qwen35_4b_ebft --labels SFT-1e5,SFT-2e5,EBFT \
#       -o out/qwen35_4b_lr_sweep.html
#
# Launch:
#   CUDA_VISIBLE_DEVICES=0 PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True \
#     python training/qlora_train.py --config semancer_qwen35_4b_sft_lr2x.yaml

method: sft
model: /mnt/two/weights/Qwen_Qwen3.5-4B/4
out: out/ab_qwen35_4b_sft_lr2x
run_name: qwen35-4b-semancy-sft-lr2x

parallel: single

# LoRA / optimization  (matched to the 1e-5 SFT arm EXCEPT lr, doubled)
r: 16
alpha: 16
use_rslora: true
init_lora: default
lr: 0.00002            # 2e-5 -- DOUBLE the A/B's 1e-5; the only intended change
weight_decay: 0.01
scheduler: cosine
warmup_ratio: 0.03
epochs: 1
batch: 4
grad_accum: 1
max_grad_norm: 1.0
compute_dtype: bfloat16

# Data
dataset: UnstableLlama/semancy
messages_key: messages
prompt_format: qwen3.5-nothink   # this model's validated chat format (not `auto`)
seq_len: 1024
pack: false
shuffle: true

# Trainable modules (7 default projections; Qwen3.5-4B text tower is dense)
targets:
  - down_proj
  - gate_proj
  - up_proj
  - q_proj
  - k_proj
  - v_proj
  - o_proj
offload_activations: false
attn_impl: auto

# Live sample generations -- matched to the 1e-5 SFT arm.
sample_every: 11
sample_prompt: "What is truth?"

# Evaluation
eval_split: test
eval_every: 10
save_best: true
run_log: qlora_runs.csv

# Logging: local HTML run report is on by default (run_name above titles it).
