# Qwen3.5-4B (4bpw) on semancy -- SFT arm of the SFT-vs-EBFT A/B.
# Pairs with semancer_qwen35_4b_ebft.yaml: identical data / LoRA / optimizer;
# only the objective differs (next-token CE here, energy-based feature matching
# there). Hyperparameters MATCH the Llama-1B A/B (r16/a16, lr 1e-5, 1 epoch) so
# the two model scales are comparable; see the S42 result in doc/ebft.md.
# Overlay the two arms afterwards with:
#   python training/run_report.py out/ab_qwen35_4b_sft out/ab_qwen35_4b_ebft \
#       --labels SFT,EBFT -o out/qwen35_4b_sft_vs_ebft.html
#
# Launch:
#   CUDA_VISIBLE_DEVICES=0 PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True \
#     python training/qlora_train.py --config semancer_qwen35_4b_sft.yaml

method: sft
model: /mnt/two/weights/Qwen_Qwen3.5-4B/4
out: out/ab_qwen35_4b_sft
run_name: qwen35-4b-semancy-sft

parallel: single

# LoRA / optimization  (matched to the EBFT arm AND to the Llama-1B A/B)
r: 16
alpha: 16
use_rslora: true
init_lora: default
lr: 0.00001            # 1e-5, matched to the EBFT arm to control LR
weight_decay: 0.01
scheduler: cosine
warmup_ratio: 0.03
epochs: 1
batch: 4
grad_accum: 1
max_grad_norm: 1.0
compute_dtype: bfloat16

# Data
dataset: UnstableLlama/semancy
messages_key: messages
prompt_format: qwen3.5-nothink   # this model's validated chat format (not `auto`)
seq_len: 1024
pack: false
shuffle: true

# Trainable modules (7 default projections; Qwen3.5-4B text tower is dense)
targets:
  - down_proj
  - gate_proj
  - up_proj
  - q_proj
  - k_proj
  - v_proj
  - o_proj
offload_activations: false   # OFF: matches the EBFT arm (its offload pool OOMs
                             # the host -- see doc/ebft.md). 4B@4bpw fits a 3090.
attn_impl: auto

# Live sample generations -- matched to the EBFT arm. ~436 examples / batch 4 =
# ~109 steps/epoch, so every 11 steps is ~a tenth of an epoch (~10 previews).
sample_every: 11
sample_prompt: "What is truth?"

# Evaluation
eval_split: test
eval_every: 10
save_best: true
run_log: qlora_runs.csv

# Logging: local HTML run report is on by default (run_name above titles it).
