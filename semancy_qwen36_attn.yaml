# EXL3 QLoRA — Qwen3.6-35B-A3B on semancy, A/B arm A: attention + shared-expert
# MLP only (7 default targets, NO routed-expert adapters).
# Launch: PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True \
#           python training/qlora_train.py --config semancy_qwen36_attn.yaml

# Required
model: /mnt/two/weights/Qwen_Qwen3.6-35B-A3B/6
out: out/qwen36_semancy_attn

# Execution mode
parallel: split
use_per_device: [18, 23]    # natural split from the S23 smoke; head on cuda:1

# LoRA / optimization
r: 32
alpha: 32                   # alpha = r; with rsLoRA eff scale = 32/sqrt(32) ~= 5.7
use_rslora: true
init_lora: pissa
lr: 0.00005                 # 5e-5 (the Gemma4-MoE semancy sweet-spot recipe)
weight_decay: 0.01
scheduler: cosine
warmup_ratio: 0.03
epochs: 2                   # past the 1-epoch sweet spot so save_best can pick it
batch: 2
grad_accum: 1
max_grad_norm: 1.0
compute_dtype: bfloat16

# Data
dataset: UnstableLlama/semancy
messages_key: messages      # semancy is an OpenAI-style chat dataset
prompt_format: qwen3.5-nothink
seq_len: 1024               # semancy prompts ~26 tok, responses ~370
pack: false
shuffle: true

# Trainable modules — attention + shared-expert MLP only (A/B arm A)
targets:
  - down_proj
  - gate_proj
  - up_proj
  - q_proj
  - k_proj
  - v_proj
  - o_proj
offload_activations: true
attn_impl: auto
sample_every: 0             # skip live 35B decode samples; judge by eval curve

# Checkpoints (checkpoint_every, NOT save_every — save_every clobbers save_best)
checkpoint_every: 40
keep_checkpoints: 12

# Evaluation / run log
eval_split: test            # 116-row held-out split
eval_every: 20              # dense curve; save_best is gated on eval_every > 0
save_best: true
profile_dequant: 3
run_log: qlora_runs.csv
